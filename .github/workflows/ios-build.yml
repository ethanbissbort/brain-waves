name: iOS Build

# Builds and tests the committed BrainWaves.xcodeproj against the iOS 26 SDK
# (Xcode 26) with a minimum deployment target of iOS 18. This validates the
# exact project that developers open in Xcode.

on:
  push:
    branches:
      - claude/codebase-crawl-validate-refactor-v0eka1
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS 26 SDK, min iOS 18)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK)
        run: |
          set -e
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$XC" ]; then
            echo "::error::No Xcode 26 found on this runner (required for the iOS 26 SDK)."
            exit 1
          fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version
          echo "Available iOS SDKs:"; xcodebuild -showsdks | grep -i ios || true

      - name: Select an available iOS Simulator
        id: sim
        run: |
          set -e
          UDID=$(xcrun simctl list devices available | grep -m1 'iPhone' | grep -Eo '[0-9A-Fa-f-]{36}')
          if [ -z "$UDID" ]; then
            echo "::error::No available iPhone simulator found"
            exit 1
          fi
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild \
            -project BrainWaves/BrainWaves.xcodeproj \
            -scheme BrainWaves \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            CODE_SIGNING_ALLOWED=NO \
            clean test
